name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test-api:
    name: API (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check api/
      - name: Format check (ruff)
        run: ruff format --check api/
      - name: Type check (mypy)
        run: mypy api/ --ignore-missing-imports
      - name: Tests (pytest)
        run: pytest tests/api/ -v --tb=short

  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Lint (eslint)
        run: npm run lint
      - name: Type check (tsc)
        run: npx tsc --noEmit
      - name: Tests (vitest)
        run: npx vitest run
      - name: Build
        run: npm run build
